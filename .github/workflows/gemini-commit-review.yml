name: '🔎 Gemini Commit Review'

on:
  pull_request:
    types: [synchronize]

concurrency:
  group: '${{ github.workflow }}-commit-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  get-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      pull-requests: 'read'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get new commits
        id: set-matrix
        run: |
          # Tentativa de obter a lista de commits entre o estado anterior (before) e o atual (after)
          # Em caso de force push, isso pode falhar. Tratamos para evitar erros de workflow.
          COMMITS=$(git log --format="%H" ${{ github.event.before }}..${{ github.event.after }} || echo "")
          
          if [ -z "$COMMITS" ]; then
            # Se a lista falhar (ou empty diff), pegamos apenas o commit que encabeça o push
            COMMITS="${{ github.event.after }}"
          fi
          
          # Transforma cada linha de commit num elemento de array JSON para a matriz
          JSON_ARRAY=$(echo "$COMMITS" | jq -R . | jq -s -c 'map(select(length > 0))')
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  review-commit:
    needs: get-commits
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    strategy:
      matrix:
        commit: ${{ fromJson(needs.get-commits.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@v2'
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'


      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0

      - name: 'Pull GitHub MCP Server Image'
        run: docker pull ghcr.io/github/github-mcp-server:v0.27.0

      - name: 'Copy custom Gemini commands'
        run: |
          mkdir -p .gemini/commands
          cp .github/commands/*.toml .gemini/commands/ || true

      - name: 'Run Gemini commit review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        id: 'gemini_commit_review'
        env:
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number }}'
          REPOSITORY: '${{ github.repository }}'
          COMMIT_SHA: '${{ matrix.commit }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: 'gemma-4-26b-a4b-it'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-commit-review'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_issue_comment",
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write",
                    "get_commit"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          prompt: '/gemini-commit-review'
