name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        run: |
          # Captura o diff entre a base e o head do PR
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > pr_diff.txt
          echo "diff_path=pr_diff.txt" >> $GITHUB_OUTPUT

      - name: AI Review
        id: ai_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Script para chamar a API do Gemini e processar o review
          cat << 'EOF' > review_script.cjs
          const fs = require('fs');
          const https = require('https');

          const diff = fs.readFileSync('pr_diff.txt', 'utf8').substring(0, 25000);
          const apiKey = process.env.GEMINI_API_KEY;
          
          const model = "gemma-4-31b-it"; 
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

          const promptText = `Você é um revisor de código sênior. Analise o seguinte DIFF de um Pull Request e forneça um review detalhado em Markdown (Português do Brasil).

          ESTRUTURA DO REVIEW:
          1. **Resumo das Features**: O que mudou?
          2. **Análise Geral**: Visão técnica da mudança.
          3. **Pontos Positivos**: O que foi bem feito.
          4. **Pontos Negativos/Problemas**: Bugs potenciais ou má prática.
          5. **Pontos de Atenção**: Sugestões de melhoria ou riscos.

          REGRA CRÍTICA: 
          Se o código for de alta qualidade, não tiver erros claros, não quebrar o projeto e propuser atualizações interessantes, responda APENAS com o emoji "👍" e nada mais.

          DIFF:
          ${diff}`;

          const payload = JSON.stringify({
            contents: [{ parts: [{ text: promptText }] }]
          });

          const options = {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(payload)
            }
          };

          const req = https.request(url, options, (res) => {
            let responseData = '';
            res.on('data', (chunk) => responseData += chunk);
            res.on('end', () => {
              if (res.statusCode !== 200) {
                console.error(`Erro na API (${res.statusCode}):`, responseData);
                fs.writeFileSync('review_result.md', `⚠️ Erro na análise da AI (Status ${res.statusCode}).`);
                process.exit(0);
              }
              try {
                const json = JSON.parse(responseData);
                if (json.candidates && json.candidates[0].content) {
                  const text = json.candidates[0].content.parts[0].text.trim();
                  fs.writeFileSync('review_result.md', text);
                } else {
                  console.error("Resposta inesperada:", json);
                  fs.writeFileSync('review_result.md', "⚠️ A AI não retornou uma análise válida.");
                }
              } catch (e) {
                console.error("Erro ao processar JSON:", e);
                process.exit(1);
              }
            });
          });

          req.on('error', (e) => {
            console.error("Erro na requisição:", e);
            process.exit(1);
          });
          req.write(payload);
          req.end();
          EOF

          node review_script.cjs

      - name: Post Comment
        if: success()
        uses: peter-evans/create-or-update-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: 'review_result.md'
