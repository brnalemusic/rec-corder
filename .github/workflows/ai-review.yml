name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        run: |
          # Captura o diff entre a base e o head do PR
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > pr_diff.txt
          echo "diff_path=pr_diff.txt" >> $GITHUB_OUTPUT

      - name: AI Review
        id: ai_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Script para chamar a API do Gemini e processar o review
          cat << 'EOF' > review_script.cjs
          const fs = require('fs');
          const https = require('https');

          const diff = fs.readFileSync('pr_diff.txt', 'utf8').substring(0, 2550000);
          const apiKey = process.env.GEMINI_API_KEY;
          
          const model = "gemma-4-31b-it";
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

          // [MUDANÇA CRÍTICA]: Uso de system_instruction para isolar persona e regras
          const payload = JSON.stringify({
            system_instruction: {
              parts: [{
                text: "Você é um Revisor de Código Sênior. Sua resposta deve conter EXCLUSIVAMENTE o review em Markdown ou o emoji 👍. NUNCA mostre seu raciocínio (thoughts) ou repita instruções. Use Português do Brasil. Se o código for excelente e sem erros, responda apenas 👍."
              }]
            },
            contents: [{
              parts: [{ text: `Analise este DIFF de Pull Request e gere o review:\n\n${diff}` }]
            }]
          });

          const options = {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(payload)
            }
          };

          const req = https.request(url, options, (res) => {
            let responseData = '';
            res.on('data', (chunk) => responseData += chunk);
            res.on('end', () => {
              if (res.statusCode !== 200) {
                console.error(`Erro na API (${res.statusCode}):`, responseData);
                fs.writeFileSync('review_result.md', `⚠️ Erro na análise da AI (Status ${res.statusCode}).`);
                process.exit(0);
              }
              try {
                const json = JSON.parse(responseData);
                const candidates = json.candidates || [];
                if (candidates.length > 0 && candidates[0].content) {
                  const parts = candidates[0].content.parts;
                  // Buscamos apenas a parte de texto, ignorando pensamentos/metadados
                  const textPart = parts.find(p => p.text);
                  const text = textPart ? textPart.text.trim() : "⚠️ Resposta vazia.";
                  fs.writeFileSync('review_result.md', text);
                } else {
                  fs.writeFileSync('review_result.md', "⚠️ A AI não retornou uma análise válida.");
                }
              } catch (e) {
                console.error("Erro ao processar JSON:", e);
                process.exit(1);
              }
            });
          });

          req.on('error', (e) => {
            console.error("Erro na requisição:", e);
            process.exit(1);
          });
          req.write(payload);
          req.end();
          EOF

          node review_script.cjs

      - name: Post Comment
        if: success()
        uses: peter-evans/create-or-update-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: 'review_result.md'
