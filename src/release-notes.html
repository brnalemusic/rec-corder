<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas de Lançamento - Rec Corder</title>
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/reset.css">
  <style>
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      user-select: none;
    }

    .container {
      padding: 24px;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .logo {
      width: 48px;
      height: 48px;
    }

    .title-container {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: var(--text-primary);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin: 2px 0 0 0;
    }

    .content {
      flex: 1;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
      overflow-y: auto;
      padding-right: 12px;
    }

    /* Scrollbar Styling */
    .content::-webkit-scrollbar {
      width: 8px;
    }

    .content::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--bg-elevated);
      border-radius: 4px;
      border: 2px solid var(--bg-primary);
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: var(--bg-hover);
    }

    .changelog-container {
      margin-top: 8px;
    }

    /* ─── GitHub-like Markdown Styling (GitHub Dark Theme) ─── */
    .markdown-body {
      color: var(--text-secondary);
      font-family: var(--font-sans);
      line-height: 1.6;
      word-wrap: break-word;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      color: var(--text-primary);
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
    }

    .markdown-body h1,
    .markdown-body h2 {
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--border-soft);
    }

    .markdown-body a {
      color: #00d4ff;
      /* Cyan link */
      text-decoration: none;
      transition: color 0.2s;
    }

    .markdown-body a:hover {
      text-decoration: underline;
      color: #33e0ff;
    }

    .markdown-body p,
    .markdown-body blockquote,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body dl,
    .markdown-body table,
    .markdown-body pre {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 2em;
    }

    .markdown-body li+li {
      margin-top: 0.25em;
    }

    .markdown-body blockquote {
      padding: 0 1em;
      color: var(--text-muted);
      border-left: 0.25em solid #30363d;
    }

    /* GitHub Admonitions (Alerts) */
    .markdown-body .markdown-alert {
      padding: 0.5rem 1rem;
      margin-bottom: 16px;
      color: inherit;
      border-left: 0.25em solid #30363d;
      border-radius: 0 6px 6px 0;
      background-color: rgba(110, 118, 129, 0.05);
    }
    .markdown-body .markdown-alert-title {
      display: flex;
      align-items: center;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .markdown-body .markdown-alert-title svg {
      margin-right: 8px;
      fill: currentColor;
    }
    .markdown-body .markdown-alert p:last-child {
      margin-bottom: 0;
    }
    
    .markdown-body .markdown-alert-note { border-left-color: #1f6feb; }
    .markdown-body .markdown-alert-note .markdown-alert-title { color: #4493f8; }
    
    .markdown-body .markdown-alert-tip { border-left-color: #238636; }
    .markdown-body .markdown-alert-tip .markdown-alert-title { color: #3fb950; }
    
    .markdown-body .markdown-alert-important { border-left-color: #8957e5; }
    .markdown-body .markdown-alert-important .markdown-alert-title { color: #a371f7; }
    
    .markdown-body .markdown-alert-warning { border-left-color: #9e6a03; }
    .markdown-body .markdown-alert-warning .markdown-alert-title { color: #d2991d; }
    
    .markdown-body .markdown-alert-caution { border-left-color: #da3633; }
    .markdown-body .markdown-alert-caution .markdown-alert-title { color: #f85149; }

    /* Code Blocks with Prism support */
    .markdown-body pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background-color: #161b22;
      border-radius: 6px;
      border: 1px solid var(--border-soft);
    }

    .markdown-body code {
      padding: 0.2em 0.4em;
      margin: 0;
      font-size: 85%;
      background-color: rgba(110, 118, 129, 0.4);
      border-radius: 6px;
      font-family: var(--font-mono);
    }

    .markdown-body pre code {
      padding: 0;
      margin: 0;
      background-color: transparent;
      border: 0;
      word-break: normal;
      white-space: pre;
      font-size: 100%;
    }

    /* Tables */
    .markdown-body table {
      display: block;
      width: 100%;
      width: max-content;
      max-width: 100%;
      overflow: auto;
      border-spacing: 0;
      border-collapse: collapse;
    }

    .markdown-body table th {
      font-weight: 600;
      background-color: #161b22;
    }

    .markdown-body table th,
    .markdown-body table td {
      padding: 6px 13px;
      border: 1px solid #30363d;
    }

    .markdown-body table tr {
      background-color: var(--bg-primary);
      border-top: 1px solid #21262d;
    }

    .markdown-body table tr:nth-child(2n) {
      background-color: #161b22;
    }

    .hidden {
      display: none;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
    }

    .video-spinner {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 50%;
    }

    /* Drag region */
    .drag-region {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
    }
  </style>
</head>

<body>
  <div class="drag-region" data-tauri-drag-region></div>
  <div class="container">
    <div class="header">
      <img src="assets/logo.png" alt="Logo" class="logo">
      <div class="title-container">
        <h1 class="title">Notas de Lançamento</h1>
        <p class="subtitle" id="version-subtitle">Versão ...</p>
      </div>
    </div>

    <div id="content-area" class="content">
      <div id="loading" class="loading-container"></div>
      <div class="changelog-container">
        <div id="changelog-content" class="markdown-body"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- PrismJS for Syntax Highlighting -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script type="module" src="scripts/release-notes.js"></script>
</body>

</html>
