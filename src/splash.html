<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rec Corder - Inicializando</title>
  <link rel="stylesheet" href="styles/variables.css" />
  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components/timer.css" />
  <link rel="stylesheet" href="styles/components/buttons.css" />
  <link rel="stylesheet" href="styles/components/settings-panel.css" />
  <link rel="stylesheet" href="styles/components/status-bar.css" />
  <link rel="stylesheet" href="styles/components/crash-banner.css" />
  <link rel="stylesheet" href="styles/components/modal.css" />
  <link rel="stylesheet" href="styles/utilities.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary, #0B0D11);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: var(--text-primary, #F1F5F9);
      font-family: var(--font-sans, 'Inter', system-ui, -apple-system, sans-serif);
      text-align: center;
      user-select: none;
    }

    .splash-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      border-radius: var(--radius-lg, 12px);
      box-shadow: var(--shadow-md, 0 4px 16px rgba(0, 0, 0, 0.4));
      border: 1px solid var(--border-soft, rgba(255, 255, 255, 0.08));
    }

    .splash-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-primary, #F1F5F9);
      letter-spacing: -0.02em;
    }

    .splash-version {
      font-size: 0.75rem;
      color: var(--text-muted, #6E7681);
      margin-bottom: 24px;
      font-weight: 500;
    }

    .splash-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary, #8B949E);
      margin-bottom: 32px;
      min-height: 1.2em;
      font-weight: 500;
    }

    .splash-video-spinner {
      margin: 0 auto;
      width: 40px;
      height: 40px;
      object-fit: cover;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <img src="assets/logo.png" alt="Rec Corder" class="splash-logo" />
  <div class="splash-title">Rec Corder</div>
  <div class="splash-version" id="splashVersion"></div>
  <div class="splash-subtitle" id="statusText">Inicializando...</div>
  <video src="assets/loading_anim.mp4" class="splash-video-spinner" autoplay loop muted playsinline></video>

  <script type="module" src="scripts/splash.js"></script>
</body>
</html>
