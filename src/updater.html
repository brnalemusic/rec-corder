<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atualização do Rec Corder</title>
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/reset.css">
  <style>
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      user-select: none;
    }

    .container {
      padding: 24px;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .logo {
      width: 48px;
      height: 48px;
    }

    .title-container {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: var(--text-primary);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin: 2px 0 0 0;
    }

    .content {
      flex: 1;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
      overflow-y: auto;
      padding-right: 12px;
    }

    /* Scrollbar Styling */
    .content::-webkit-scrollbar {
      width: 8px;
    }
    .content::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }
    .content::-webkit-scrollbar-thumb {
      background: var(--bg-elevated);
      border-radius: 4px;
      border: 2px solid var(--bg-primary);
    }
    .content::-webkit-scrollbar-thumb:hover {
      background: var(--bg-hover);
    }

    .changelog-container {
      margin-top: 24px;
      padding-top: 24px;
    }

    .changelog-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .changelog-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }

    /* ─── GitHub-like Markdown Styling (GitHub Dark Theme) ─── */
    .markdown-body {
      color: var(--text-secondary);
      font-family: var(--font-sans);
      line-height: 1.6;
      word-wrap: break-word;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3, 
    .markdown-body h4, .markdown-body h5, .markdown-body h6 {
      color: var(--text-primary);
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
    }
    .markdown-body h1, .markdown-body h2 {
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--border-soft);
    }
    .markdown-body a {
      color: #00d4ff; /* Cyan link */
      text-decoration: none;
      transition: color 0.2s;
    }
    .markdown-body a:hover {
      text-decoration: underline;
      color: #33e0ff;
    }
    .markdown-body p, .markdown-body blockquote, .markdown-body ul, 
    .markdown-body ol, .markdown-body dl, .markdown-body table, .markdown-body pre {
      margin-top: 0;
      margin-bottom: 16px;
    }
    .markdown-body ul, .markdown-body ol {
      padding-left: 2em;
    }
    .markdown-body li + li {
      margin-top: 0.25em;
    }
    .markdown-body blockquote {
      padding: 0 1em;
      color: var(--text-muted);
      border-left: 0.25em solid #30363d;
    }
    
    /* Code Blocks with Prism support */
    .markdown-body pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background-color: #161b22;
      border-radius: 6px;
      border: 1px solid var(--border-soft);
    }
    .markdown-body code {
      padding: 0.2em 0.4em;
      margin: 0;
      font-size: 85%;
      background-color: rgba(110, 118, 129, 0.4);
      border-radius: 6px;
      font-family: var(--font-mono);
    }
    .markdown-body pre code {
      padding: 0;
      margin: 0;
      background-color: transparent;
      border: 0;
      word-break: normal;
      white-space: pre;
      font-size: 100%;
    }

    /* Tables */
    .markdown-body table {
      display: block;
      width: 100%;
      width: max-content;
      max-width: 100%;
      overflow: auto;
      border-spacing: 0;
      border-collapse: collapse;
    }
    .markdown-body table th {
      font-weight: 600;
      background-color: #161b22;
    }
    .markdown-body table th, .markdown-body table td {
      padding: 6px 13px;
      border: 1px solid #30363d;
    }
    .markdown-body table tr {
      background-color: var(--bg-primary);
      border-top: 1px solid #21262d;
    }
    .markdown-body table tr:nth-child(2n) {
      background-color: #161b22;
    }

    .version-info {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px;
      margin-top: 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent-primary);
    }

    .progress-container {
      margin-top: 24px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .progress-bar-bg {
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border-soft);
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent-primary);
      width: 0%;
      transition: width 0.2s ease-out;
      box-shadow: 0 0 10px var(--accent-subtle);
      position: relative;
      overflow: hidden;
    }

    .progress-bar-fill::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      animation: progress-pulse 1.5s infinite;
    }

    @keyframes progress-pulse {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .error-text {
      color: #ff4d4d;
      font-size: 13px;
      margin-top: 12px;
      line-height: 1.5;
    }

    .download-link {
      color: #00d4ff;
      text-decoration: underline;
      cursor: pointer;
      font-weight: 600;
    }

    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: none;
      outline: none;
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    .btn-primary {
      background: var(--accent-primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      background: var(--accent-active);
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .hidden {
      display: none;
    }

    /* Drag region for custom title bars if needed, but here we just use it for the whole top area */
    .drag-region {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      data-tauri-drag-region;
    }
  </style>
</head>
<body>
  <div class="drag-region"></div>
  <div class="container">
    <div class="header">
      <img src="assets/logo.png" alt="Logo" class="logo">
      <div class="title-container">
        <h1 class="title">Atualização Disponível</h1>
        <p class="subtitle">Uma nova versão do Rec Corder está pronta.</p>
      </div>
    </div>

    <div class="content">
      <p id="status-text">Uma nova versão está disponível para download. Recomendamos atualizar para obter as últimas melhorias e correções de bugs.</p>
      <div class="version-info" id="version-info">
        Versão disponível: <span id="new-version">...</span>
      </div>

      <div id="download-section" class="progress-container hidden">
        <div class="progress-label">
          <span id="download-status">Baixando...</span>
          <span id="download-percent">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
      </div>

      <!-- Changelog Section -->
      <div id="changelog-container" class="changelog-container hidden">
        <h2 class="changelog-title">Notas de Lançamento</h2>
        <div id="changelog-content" class="markdown-body"></div>
      </div>
    </div>

    <div class="footer" id="action-buttons">
      <button id="btn-cancel" class="btn btn-secondary">Agora não</button>
      <button id="btn-install" class="btn btn-primary">Atualizar e Reiniciar</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- PrismJS for Syntax Highlighting -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script type="module" src="scripts/updater.js"></script>
</body>
</html>
