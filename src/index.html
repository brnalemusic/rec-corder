<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rec Corder</title>
  <meta name="description" content="Ultra-light screen recorder" />
  <link rel="stylesheet" href="styles/variables.css" />
  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components/timer.css" />
  <link rel="stylesheet" href="styles/components/buttons.css" />
  <link rel="stylesheet" href="styles/components/settings-panel.css" />
  <link rel="stylesheet" href="styles/components/status-bar.css" />
  <link rel="stylesheet" href="styles/components/crash-banner.css" />
  <link rel="stylesheet" href="styles/components/modal.css" />
  <link rel="stylesheet" href="styles/utilities.css" />
</head>

<body>
  <div class="app" id="app">

    <!-- Crash Recovery Banner -->
    <div class="crash-banner" id="crashBanner">
      <span class="crash-banner__icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
          <path d="M12 9v4" />
          <path d="M12 17h.01" />
        </svg>
      </span>
      <span>Gravação anterior não foi finalizada corretamente.</span>
      <button class="crash-banner__dismiss" id="dismissCrash" aria-label="Fechar aviso">×</button>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="header__brand">
        <img src="assets/logo.png" alt="Rec Corder" class="header__app-icon" />
        <span class="header__title">Rec Corder</span>
      </div>
      <div class="header__version-container" tabindex="0">
        <span class="header__version"></span>
        <div class="header__tooltip">
          Você está utilizando uma versão estável do Rec Corder. Se encontrar erros, reporte no GitHub.
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Recording indicator -->
      <div class="rec-indicator" id="recIndicator">
        <div class="rec-indicator__dot"></div>
        <span class="rec-indicator__text">Gravando</span>
      </div>

      <!-- Timer -->
      <div class="timer">
        <div class="timer__time" id="timerDisplay">00:00:00</div>
        <div class="timer__label" id="timerLabel">Pronto para gravar</div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn btn--record" id="btnRecord" aria-label="Iniciar gravação"
          title="Clique para iniciar/parar gravação">
          <!-- Inner circle/square via CSS ::after -->
        </button>
        <div class="processing-indicator hidden" id="processingIndicator">
          <video src="assets/loading_anim.mp4" class="video-spinner" autoplay loop muted playsinline></video>
          <span class="processing-indicator__text" id="processingText">Processando...</span>
        </div>
      </div>
    </main>

    <!-- Settings -->
    <section class="settings">
      <!-- Microphone Toggle -->
      <div class="setting">
        <div class="setting__left">
          <div class="setting__icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" x2="12" y1="19" y2="22" />
            </svg>
          </div>
          <div class="setting__label">Microfone</div>
        </div>
        <div class="toggle" id="micToggle" role="switch" aria-checked="false" tabindex="0">
          <div class="toggle__knob"></div>
        </div>
      </div>

      <!-- System Audio Toggle -->
      <div class="setting">
        <div class="setting__left">
          <div class="setting__icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
            </svg>
          </div>
          <div class="setting__label">Áudio do Sistema</div>
        </div>
        <div class="toggle toggle--active" id="sysAudioToggle" role="switch" aria-checked="true" tabindex="0">
          <div class="toggle__knob"></div>
        </div>
      </div>
    </section>

    <!-- Status Bar -->
    <footer class="status-bar">
      <div class="status-bar__left">
        <div class="status-bar__dot status-bar__dot--idle" id="statusDot"></div>
        <span id="statusText">Idle</span>
      </div>
      <button class="status-bar__btn" id="videoConfigBtn" aria-label="Configurações de vídeo"
        title="Clique para abrir configurações">MP4 · H.264 · 60fps · 100%</button>
    </footer>

    <script type="module" src="scripts/utils.js"></script>
    <script type="module" src="scripts/recorder.js"></script>
    <script type="module" src="scripts/app.js"></script>
</body>

</html>
