# Read-only shell access for investigation-style workflows.
# This keeps basic inspection commands available without opening up
# arbitrary execution on less-trusted inputs.

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "cat",
  "echo",
  "find",
  "git branch",
  "git diff",
  "git log",
  "git remote",
  "git rev-parse",
  "git show",
  "git status",
  "grep",
  "head",
  "jq",
  "ls",
  "pwd",
  "rg",
  "sed",
  "tail"
]
decision = "allow"
priority = 999
